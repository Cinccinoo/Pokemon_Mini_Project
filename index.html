<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pokemon Match Studio</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #171a22;
      --soft-ink: #3f4654;
      --muted: #717888;
      --line: #dce2ed;
      --paper: #fffdf8;
      --panel: rgba(255, 255, 255, .82);
      --panel-solid: #ffffff;
      --mist: #f2f5f9;
      --red: #e64555;
      --blue: #2e74d7;
      --teal: #1c9a89;
      --amber: #f5b338;
      --leaf: #69a948;
      --shadow: 0 24px 70px rgba(24, 31, 44, .15);
      --soft-shadow: 0 12px 34px rgba(24, 31, 44, .10);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(230, 69, 85, .15) 0 24%, transparent 24% 100%),
        linear-gradient(215deg, rgba(46, 116, 215, .16) 0 28%, transparent 28% 100%),
        linear-gradient(180deg, #fffaf0 0%, #eef4fa 50%, #f7f9fc 100%);
    }

    button {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 16px clamp(18px, 4vw, 42px);
      background: rgba(255, 253, 248, .78);
      border-bottom: 1px solid rgba(220, 226, 237, .82);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      font-weight: 900;
      letter-spacing: 0;
    }

    .ball {
      position: relative;
      width: 38px;
      height: 38px;
      border: 3px solid var(--ink);
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, #fff 0 15%, var(--ink) 16% 24%, transparent 25%),
        linear-gradient(#e64555 0 45%, var(--ink) 46% 55%, #fff 56% 100%);
      box-shadow: 0 7px 18px rgba(230, 69, 85, .25);
      flex: 0 0 auto;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--soft-ink);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .status::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--teal);
      box-shadow: 0 0 0 4px rgba(28, 154, 137, .13);
    }

    main {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: clamp(20px, 4vw, 42px);
      display: grid;
      grid-template-columns: minmax(320px, .9fr) minmax(360px, 1.1fr);
      gap: clamp(20px, 4vw, 42px);
      align-items: center;
    }

    .stage {
      position: sticky;
      top: 88px;
      display: grid;
      gap: 16px;
      min-width: 0;
      align-self: start;
    }

    .hero-copy {
      display: grid;
      gap: 12px;
      justify-items: center;
      text-align: center;
    }

    .kicker {
      width: fit-content;
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 8px 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, .72);
      color: var(--blue);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      box-shadow: var(--soft-shadow);
    }

    h1 {
      margin: 0;
      max-width: 9.5em;
      font-size: clamp(34px, 5.2vw, 58px);
      line-height: 1.08;
      letter-spacing: 0;
      word-break: keep-all;
      text-wrap: balance;
    }

    .lead {
      margin: 0;
      max-width: 33rem;
      color: var(--soft-ink);
      font-size: clamp(15px, 1.55vw, 17px);
      line-height: 1.68;
      word-break: keep-all;
    }

    .showcase {
      position: relative;
      min-height: 320px;
      border: 1px solid rgba(220, 226, 237, .95);
      border-radius: var(--radius);
      overflow: hidden;
      background:
        linear-gradient(145deg, rgba(245, 179, 56, .28), transparent 34%),
        linear-gradient(315deg, rgba(28, 154, 137, .18), transparent 38%),
        rgba(255, 255, 255, .70);
      box-shadow: var(--shadow);
    }

    .showcase::before {
      content: "";
      position: absolute;
      inset: 22px;
      border: 1px solid rgba(255, 255, 255, .72);
      border-radius: var(--radius);
      pointer-events: none;
    }

    .orbit {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
    }

    .orbit-ring {
      position: absolute;
      width: min(82%, 360px);
      aspect-ratio: 1;
      border: 1px dashed rgba(63, 70, 84, .20);
      border-radius: 50%;
      animation: spin 26s linear infinite;
    }

    .pokemon-card {
      position: absolute;
      width: 116px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border: 1px solid rgba(220, 226, 237, .95);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .82);
      box-shadow: 0 14px 34px rgba(24, 31, 44, .12);
      backdrop-filter: blur(10px);
    }

    .pokemon-card img {
      width: 104%;
      height: 104%;
      object-fit: contain;
      filter: drop-shadow(0 16px 16px rgba(24, 31, 44, .17));
    }

    .pokemon-card.big {
      width: min(48%, 230px);
      left: 50%;
      top: 50%;
      transform: translate(-50%, -48%);
      background: rgba(255, 253, 248, .94);
    }

    .pokemon-card.one {
      left: 9%;
      top: 14%;
      transform: rotate(-8deg);
    }

    .pokemon-card.two {
      right: 9%;
      top: 18%;
      transform: rotate(9deg);
    }

    .pokemon-card.three {
      left: 12%;
      bottom: 12%;
      transform: rotate(7deg);
    }

    .pokemon-card.four {
      right: 11%;
      bottom: 10%;
      transform: rotate(-6deg);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .trait-panel {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .trait-pill {
      min-height: 72px;
      padding: 12px;
      border: 1px solid rgba(220, 226, 237, .95);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .72);
      box-shadow: var(--soft-shadow);
    }

    .trait-pill b,
    .trait-pill span {
      display: block;
    }

    .trait-pill b {
      font-size: 18px;
    }

    .trait-pill span {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .workspace {
      display: grid;
      gap: 14px;
      min-width: 0;
    }

    .quiz,
    .result {
      border: 1px solid rgba(220, 226, 237, .95);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .quiz-head {
      display: grid;
      gap: 14px;
      padding: clamp(18px, 4vw, 28px);
      border-bottom: 1px solid rgba(220, 226, 237, .78);
      background:
        linear-gradient(90deg, rgba(230, 69, 85, .10), transparent),
        rgba(255, 255, 255, .52);
    }

    .quiz-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      color: var(--blue);
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .meter {
      height: 9px;
      border-radius: 999px;
      background: #e5eaf2;
      overflow: hidden;
    }

    .meter span {
      display: block;
      width: var(--progress);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--red), var(--amber), var(--teal), var(--blue));
      transition: width .28s ease;
    }

    .quiz-body {
      padding: clamp(18px, 4vw, 28px);
      display: grid;
      gap: 20px;
    }

    h2 {
      margin: 0;
      font-size: clamp(25px, 4.2vw, 38px);
      line-height: 1.18;
      letter-spacing: 0;
    }

    .answers {
      display: grid;
      gap: 11px;
    }

    .answer {
      position: relative;
      width: 100%;
      min-height: 64px;
      padding: 15px 50px 15px 17px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .72);
      color: var(--ink);
      text-align: left;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(24, 31, 44, .06);
      transition: transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
    }

    .answer::after {
      content: "›";
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--blue);
      font-size: 28px;
      line-height: 1;
    }

    .answer:hover,
    .answer:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(46, 116, 215, .72);
      background: var(--panel-solid);
      box-shadow: 0 16px 34px rgba(46, 116, 215, .13);
      outline: none;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .icon-btn,
    .primary-btn,
    .ghost-btn {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      min-height: 44px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #fff;
      color: var(--ink);
      font-weight: 900;
    }

    .icon-btn {
      width: 44px;
      font-size: 24px;
      line-height: 1;
    }

    .primary-btn,
    .ghost-btn {
      padding: 0 16px;
    }

    .primary-btn {
      border-color: transparent;
      color: #fff;
      background: linear-gradient(135deg, var(--red), #d74788 55%, var(--blue));
      box-shadow: 0 12px 28px rgba(230, 69, 85, .22);
    }

    .icon-btn:disabled {
      opacity: .38;
      cursor: not-allowed;
      box-shadow: none;
    }

    .result {
      display: none;
      padding: clamp(18px, 4vw, 30px);
      gap: 22px;
    }

    .result.is-visible {
      display: grid;
    }

    .loading {
      display: none;
      color: var(--soft-ink);
      font-weight: 900;
    }

    .loading.is-visible {
      display: block;
    }

    .result-grid {
      display: grid;
      grid-template-columns: minmax(180px, 260px) 1fr;
      gap: clamp(18px, 4vw, 28px);
      align-items: center;
    }

    .art {
      position: relative;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 50% 44%, rgba(255, 255, 255, .98) 0 34%, transparent 35%),
        linear-gradient(145deg, rgba(245, 179, 56, .26), rgba(46, 116, 215, .13)),
        #fff;
      overflow: hidden;
    }

    .art::before,
    .art::after {
      content: "";
      position: absolute;
      border: 1px dashed rgba(63, 70, 84, .20);
      border-radius: 50%;
      pointer-events: none;
    }

    .art::before {
      inset: 18%;
    }

    .art::after {
      inset: 30%;
    }

    .art img {
      position: relative;
      z-index: 1;
      width: 98%;
      height: 98%;
      object-fit: contain;
      filter: drop-shadow(0 20px 20px rgba(24, 31, 44, .18));
    }

    .eyebrow {
      margin: 0 0 7px;
      color: var(--red);
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
    }

    .result h2 {
      font-size: clamp(34px, 6vw, 60px);
      line-height: .95;
    }

    .chips,
    .near-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .78);
      padding: 8px 11px;
      color: var(--soft-ink);
      font-size: 12px;
      font-weight: 900;
    }

    .match-text {
      margin: 14px 0 0;
      color: var(--soft-ink);
      line-height: 1.72;
    }

    .insight-grid {
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 12px;
      align-items: start;
    }

    .insight-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .70);
      padding: 14px;
      min-width: 0;
    }

    .insight-card h3 {
      margin: 0 0 12px;
      font-size: 15px;
      letter-spacing: 0;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 70px 1fr 32px;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
      color: var(--soft-ink);
      font-size: 13px;
      font-weight: 800;
    }

    .bar {
      height: 9px;
      border-radius: 999px;
      background: #e5eaf2;
      overflow: hidden;
    }

    .bar span {
      display: block;
      width: var(--value);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--teal), var(--blue));
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .stat {
      min-width: 0;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .76);
    }

    .stat b,
    .stat span {
      display: block;
    }

    .stat b {
      font-size: 20px;
    }

    .stat span {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .near-list .chip {
      background: rgba(242, 245, 249, .80);
    }

    @media (max-width: 900px) {
      main {
        grid-template-columns: 1fr;
        align-items: start;
      }

      .stage {
        position: static;
      }

      h1 {
        max-width: 11em;
        font-size: clamp(34px, 8vw, 52px);
      }

      .lead {
        max-width: 38rem;
      }

      .showcase {
        min-height: 300px;
      }
    }

    @media (max-width: 620px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .status {
        white-space: normal;
      }

      .trait-panel,
      .insight-grid,
      .result-grid {
        grid-template-columns: 1fr;
      }

      h1 {
        max-width: 8.5em;
        font-size: clamp(31px, 10.5vw, 42px);
      }

      .lead {
        font-size: 15px;
      }

      .pokemon-card {
        width: 88px;
      }

      .pokemon-card.big {
        width: min(54%, 190px);
      }

      .stat-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="ball" aria-hidden="true"></span>
        <span>Pokemon Match Studio</span>
      </div>
      <div class="status" id="status">PokeAPI 연결 대기 중</div>
    </header>

    <main>
      <section class="stage" aria-labelledby="title">
        <div class="hero-copy">
          <span class="kicker">Personality Finder</span>
          <h1 id="title">내 성격에 맞는 포켓몬은?</h1>
          <p class="lead">16개의 선택으로 성향을 읽고, 실제 PokeAPI 데이터에서 가장 잘 맞는 파트너를 찾아요. 결과는 타입, 능력치, 도감 설명까지 함께 보여줍니다.</p>
        </div>

        <div class="showcase" aria-hidden="true">
          <div class="orbit">
            <span class="orbit-ring"></span>
            <div class="pokemon-card big"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/448.png" alt=""></div>
            <div class="pokemon-card one"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" alt=""></div>
            <div class="pokemon-card two"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/282.png" alt=""></div>
            <div class="pokemon-card three"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/133.png" alt=""></div>
            <div class="pokemon-card four"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/908.png" alt=""></div>
          </div>
        </div>

        <div class="trait-panel" aria-label="성향 축">
          <div class="trait-pill"><b>Brave</b><span>결단, 돌파, 정면 승부</span></div>
          <div class="trait-pill"><b>Calm</b><span>침착, 안정, 균형감</span></div>
          <div class="trait-pill"><b>Clever</b><span>분석, 전략, 관찰력</span></div>
          <div class="trait-pill"><b>Loyal</b><span>신뢰, 다정함, 책임감</span></div>
          <div class="trait-pill"><b>Playful</b><span>재치, 자유로움, 활력</span></div>
          <div class="trait-pill"><b>Social</b><span>연결, 표현, 분위기</span></div>
        </div>
      </section>

      <section class="workspace">
        <section class="quiz" aria-live="polite">
          <div class="quiz-head">
            <div class="quiz-meta">
              <span id="questionCount"></span>
              <span id="questionPercent"></span>
            </div>
            <div class="meter" aria-hidden="true"><span id="progress"></span></div>
          </div>
          <div class="quiz-body">
            <h2 id="questionText"></h2>
            <div class="answers" id="answers"></div>
            <div class="controls">
              <button class="icon-btn" id="backBtn" type="button" title="이전" aria-label="이전">‹</button>
              <button class="ghost-btn" id="resetBtn" type="button">처음부터</button>
            </div>
          </div>
        </section>

        <section class="result" id="result" aria-live="polite">
          <div class="loading" id="loading">결과를 불러오는 중...</div>
          <div id="resultContent"></div>
        </section>
      </section>
    </main>
  </div>

  <script>
    const traitNames = {
      brave: "용기",
      calm: "침착",
      clever: "전략",
      focused: "집중",
      loyal: "신뢰",
      playful: "재치",
      social: "사교"
    };

    const questions = [
      { text: "쉬는 날에 가장 끌리는 쪽은?", answers: [
        { text: "새로운 곳을 정해서 바로 나간다", traits: { brave: 3, social: 1 } },
        { text: "좋아하는 공간에서 조용히 충전한다", traits: { calm: 3, clever: 1 } },
        { text: "친한 사람들과 가볍게 시간을 보낸다", traits: { social: 3, loyal: 1 } },
        { text: "흥미로운 걸 하나 파고든다", traits: { clever: 3, focused: 1 } }
      ] },
      { text: "팀에서 자연스럽게 맡는 역할은?", answers: [
        { text: "방향을 정하고 먼저 움직인다", traits: { brave: 2, focused: 2 } },
        { text: "분위기를 살피고 균형을 맞춘다", traits: { calm: 2, loyal: 2 } },
        { text: "아이디어를 내고 판을 바꾼다", traits: { clever: 3, playful: 1 } },
        { text: "사람들이 편하게 말하게 만든다", traits: { social: 2, playful: 2 } }
      ] },
      { text: "갑자기 문제가 생기면?", answers: [
        { text: "빠르게 부딪혀 보면서 답을 찾는다", traits: { brave: 3, focused: 1 } },
        { text: "잠깐 멈추고 흐름을 정리한다", traits: { calm: 3, clever: 1 } },
        { text: "주변 사람과 정보를 나눈다", traits: { social: 3, loyal: 1 } },
        { text: "원인을 끝까지 추적한다", traits: { clever: 2, focused: 2 } }
      ] },
      { text: "낯선 모임에 들어갔을 때 나는?", answers: [
        { text: "먼저 말을 걸고 분위기를 연다", traits: { social: 3, playful: 1 } },

    const quiz = document.querySelector(".quiz");

    function renderQuestion() {
      const question = questions[state.step];
      const percent = Math.round((state.step / questions.length) * 100);

      progress.style.setProperty("--progress", `${percent}%`);
      questionCount.textContent = `Question ${state.step + 1} / ${questions.length}`;
      questionPercent.textContent = `${percent}%`;
      questionText.textContent = question.text;
      backBtn.disabled = state.step === 0;
      result.classList.remove("is-visible");
      resultContent.innerHTML = "";

      answers.innerHTML = "";
      question.answers.forEach((answer) => {
        const button = document.createElement("button");
        button.className = "answer";
        button.type = "button";
        button.textContent = answer.text;
        button.addEventListener("click", () => choose(answer));
        answers.append(button);
      });
    }

    function choose(answer) {
      state.picks[state.step] = answer;
      state.step += 1;

      if (state.step >= questions.length) {
        progress.style.setProperty("--progress", "100%");
        questionPercent.textContent = "100%";
        showResult();
        return;
      }

      renderQuestion();
    }

    function getScores() {
      return state.picks.reduce((scores, pick) => {
        Object.entries(pick.traits).forEach(([trait, value]) => {
          scores[trait] = (scores[trait] || 0) + value;
        });
        return scores;
      }, {});
    }

    function rankedMatches(scores) {
      return candidates
        .map((candidate) => {
          const score = Object.entries(candidate.traits).reduce((total, [trait, weight]) => {
            return total + (scores[trait] || 0) * weight;
          }, 0);
          return { ...candidate, score };
        })
        .sort((a, b) => b.score - a.score);
    }

    async function cachedFetch(url) {
      const key = `poke-cache:${url}`;
      const cached = safeStorage("get", key);
      if (cached) return JSON.parse(cached);

      const response = await fetch(url);
      if (!response.ok) throw new Error("PokeAPI request failed");
      const data = await response.json();
      safeStorage("set", key, JSON.stringify(data));
      return data;
    }

    function safeStorage(action, key, value) {
      try {
        if (action === "get") return localStorage.getItem(key);
        localStorage.setItem(key, value);
      } catch (error) {
        return null;
      }
      return null;
    }

    async function showResult() {
      const scores = getScores();
      const matches = rankedMatches(scores);
      const match = matches[0];
      const nearMatches = matches.slice(1, 4);

      quiz.style.display = "none";
      result.classList.add("is-visible");
      loading.classList.add("is-visible");
      status.textContent = "PokeAPI에서 결과 불러오는 중";

      try {
        const [pokemon, species] = await Promise.all([
          cachedFetch(`https://pokeapi.co/api/v2/pokemon/${match.id}`),
          cachedFetch(`https://pokeapi.co/api/v2/pokemon-species/${match.id}`)
        ]);

        const name = species.names.find((item) => item.language.name === "ko")?.name
          || titleCase(pokemon.name.replace("-", " "));
        const flavor = species.flavor_text_entries.find((entry) => entry.language.name === "ko")
          || species.flavor_text_entries.find((entry) => entry.language.name === "en");
        const image = pokemon.sprites.other["official-artwork"].front_default || pokemon.sprites.front_default;
        const types = pokemon.types.map((slot) => slot.type.name);
        const topStats = pokemon.stats.slice().sort((a, b) => b.base_stat - a.base_stat).slice(0, 3);
        const scoreRows = buildScoreRows(scores);

        loading.classList.remove("is-visible");
        status.textContent = "결과 준비 완료";
        resultContent.innerHTML = `
          <div class="result-grid">
            <div class="art"><img src="${image}" alt="${name}"></div>
            <div>
              <p class="eyebrow">Best Match</p>
              <h2>${name}</h2>
              <div class="chips">${types.map((type) => `<span class="chip">${type}</span>`).join("")}</div>
              <p class="match-text"><strong>${match.title}</strong><br>${match.reason}</p>
              <p class="match-text">${cleanFlavor(flavor?.flavor_text || "")}</p>
            </div>
          </div>
          <div class="insight-grid">
            <div class="insight-card">
              <h3>성향 스코어</h3>
              ${scoreRows.map((row) => `
                <div class="bar-row">
                  <span>${row.label}</span>
                  <span class="bar"><span style="--value: ${row.percent}%"></span></span>
                  <span>${row.value}</span>
                </div>
              `).join("")}
            </div>
            <div class="insight-card">
              <h3>대표 능력치</h3>
              <div class="stat-grid">
                ${topStats.map((stat) => `
                  <div class="stat">
                    <b>${stat.base_stat}</b>
                    <span>${stat.stat.name}</span>
                  </div>
                `).join("")}
              </div>
              <h3 style="margin-top: 16px;">가까운 후보</h3>
              <div class="near-list">
                ${nearMatches.map((item) => `<span class="chip">#${item.id} ${item.title.split(" ")[0]}</span>`).join("")}
              </div>
            </div>
          </div>
          <div class="controls">
            <button class="primary-btn" type="button" onclick="resetQuiz()">다시 테스트</button>
          </div>
        `;
      } catch (error) {
        loading.classList.remove("is-visible");
        status.textContent = "연결 실패";
        resultContent.innerHTML = `
          <div class="insight-card">
            <p class="eyebrow">Retry</p>
            <h2>데이터를 가져오지 못했어요</h2>
            <p class="match-text">인터넷 연결을 확인한 뒤 다시 시도해 주세요.</p>
            <button class="primary-btn" type="button" onclick="resetQuiz()">다시 하기</button>
          </div>
        `;
      }
    }

    function buildScoreRows(scores) {
      const max = Math.max(...Object.values(scores), 1);
      return Object.entries(scores)
        .map(([trait, value]) => ({
          label: traitNames[trait] || trait,
          value,
          percent: Math.max(8, Math.round((value / max) * 100))
        }))
        .sort((a, b) => b.value - a.value);
    }

    function titleCase(text) {
      return text.replace(/\b\w/g, (letter) => letter.toUpperCase());
    }

    function cleanFlavor(text) {
      return text.replace(/\f/g, " ").replace(/\s+/g, " ").trim();
    }

    function resetQuiz() {
      state.step = 0;
      state.picks = [];
      quiz.style.display = "";
      status.textContent = "PokeAPI 연결 대기 중";
      renderQuestion();
    }

    backBtn.addEventListener("click", () => {
      if (state.step === 0) return;
      state.step -= 1;
      renderQuestion();
    });

    resetBtn.addEventListener("click", resetQuiz);
    window.resetQuiz = resetQuiz;
    renderQuestion();
  </script>
</body>
</html>
